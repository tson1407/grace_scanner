name: grace_scanner
description: "ScanFlow — Modern document scanner app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Camera & Image
  image: ^4.5.2
  permission_handler: ^11.3.1

  # File & Path
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.23.1
  freezed: ^2.5.7
  json_serializable: ^6.9.2

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
